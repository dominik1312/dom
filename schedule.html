<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Day Planner</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
  :root{
    --text-primary:#FAFAFA;
    --text-secondary:#B8B6B0;
    --text-tertiary:#76746E;
    --success:#6BE3A4;
    --warning:#F2C063;
    --danger:#FF6B6B;

    --card:rgba(255,255,255,0.04);
    --hairline:rgba(255,255,255,0.06);

    --gutter:58px;
    --hour-px:64px;

    --font:-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono:ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{ background:#050506; }

  /* body is a normal block so topbar.js can inject the sticky header above .wrap */
  body{
    font-family:var(--font);
    color:var(--text-primary);
    min-height:100vh;
    padding: max(16px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) 80px max(18px, env(safe-area-inset-left));
    position:relative;
    overflow-x:hidden;
  }

  body::before{
    content:'';
    position:fixed; inset:-20%;
    background:
      radial-gradient(40% 36% at 82% 14%, rgba(224,118,88,0.16), transparent 70%),
      radial-gradient(46% 40% at 18% 90%, rgba(180,180,200,0.06), transparent 70%);
    filter:blur(40px);
    z-index:-2;
    animation:drift 36s ease-in-out infinite alternate;
    pointer-events:none;
  }
  body::after{
    content:'';
    position:fixed; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size:3px 3px;
    z-index:-1;
    pointer-events:none;
  }
  @keyframes drift{ from{ transform:translate3d(-1.5%,-1%,0);} to{ transform:translate3d(1.5%,1.5%,0);} }

  .wrap{ width:100%; max-width:1100px; margin:0 auto; }

  /* section eyebrow — matches dashboard style */
  .section-title{
    font-size:10.5px; font-weight:700;
    letter-spacing:0.18em; text-transform:uppercase;
    color:var(--text-tertiary);
    display:flex; align-items:center; gap:12px;
    margin:0 0 14px 2px;
  }
  .section-title::before{ content:''; width:18px; height:1px; background:var(--text-tertiary); opacity:0.6; }
  .section-title::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

  /* card chassis */
  .cal-card{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    backdrop-filter:blur(24px) saturate(1.2);
    -webkit-backdrop-filter:blur(24px) saturate(1.2);
    box-shadow:0 12px 40px rgba(0,0,0,0.45);
  }

  /* header */
  .cal-head{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .cal-date{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .cal-date-main{ font-size:17px; font-weight:700; letter-spacing:-0.02em; }
  .cal-date-sub{ font-family:var(--mono); font-size:11px; color:var(--text-tertiary); letter-spacing:0.02em; }
  .cal-date-sub.is-today{ color:var(--success); font-weight:700; letter-spacing:0.12em; }

  .cal-nav{ display:flex; align-items:center; gap:6px; margin-left:auto; }
  .cal-nav button{
    font-family:var(--font);
    background:rgba(255,255,255,0.04);
    border:1px solid var(--hairline);
    color:var(--text-secondary);
    border-radius:10px;
    height:34px; min-width:34px; padding:0 10px;
    cursor:pointer; font-size:13px; font-weight:600;
    transition:background .15s ease, color .15s ease, transform .12s ease;
  }
  .cal-nav button:hover{ background:rgba(255,255,255,0.08); color:var(--text-primary); }
  .cal-nav button:active{ transform:translateY(1px); }
  /* Distinct accent so "today" reads as a shortcut, not just another step button */
  .cal-nav .cal-today{
    letter-spacing:0.04em; color:var(--success);
    background:rgba(107,227,164,0.08); border-color:rgba(107,227,164,0.30);
  }
  .cal-nav .cal-today:hover{ background:rgba(107,227,164,0.16); color:var(--success); }

  .cal-add{
    background:linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
    color:#0A0A0B; font-weight:700;
    border:none; border-radius:10px;
    height:34px; padding:0 14px; cursor:pointer; font-size:13px;
    box-shadow:0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 16px rgba(0,0,0,0.35);
    transition:transform .12s ease, filter .15s ease;
  }
  .cal-add:hover{ transform:translateY(-1px); filter:brightness(1.04); }
  .cal-add:active{ transform:translateY(0); }

  /* legend + stats */
  .cal-meta{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
  .cal-stats{ font-family:var(--mono); font-size:11.5px; color:var(--text-secondary); letter-spacing:0.02em; }
  .cal-legend{ display:flex; gap:12px; flex-wrap:wrap; margin-left:auto; }
  .cal-leg{ display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--text-tertiary); }
  .cal-leg-dot{ width:9px; height:9px; border-radius:3px; }

  /* timeline */
  .cal-scroll{
    position:relative;
    max-height:560px;
    overflow-y:auto;
    border-radius:12px;
    background:rgba(0,0,0,0.22);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.03);
    scrollbar-width:thin;
    scrollbar-color:rgba(255,255,255,0.14) transparent;
  }
  .cal-scroll::-webkit-scrollbar{ width:8px; }
  .cal-scroll::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.12); border-radius:8px; }

  .cal-grid{ position:relative; }

  .cal-hline{ position:absolute; left:var(--gutter); right:0; height:1px; background:rgba(255,255,255,0.05); }
  .cal-hline.half{ background:rgba(255,255,255,0.025); }
  .cal-hlabel{
    position:absolute; left:0; width:var(--gutter);
    transform:translateY(-50%);
    padding-right:10px; text-align:right;
    font-family:var(--mono); font-size:10.5px; color:var(--text-tertiary);
    letter-spacing:0.02em; pointer-events:none;
  }

  .cal-blocks{ position:absolute; left:var(--gutter); right:8px; top:0; bottom:0; }

  .cal-empty-hint{
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    text-align:center; pointer-events:none; max-width:260px;
  }
  .cal-empty-icon{ font-size:28px; opacity:0.45; }
  .cal-empty-msg{ color:var(--text-tertiary); font-size:12.5px; line-height:1.5; }

  .cal-block{
    position:absolute;
    border-radius:9px;
    padding:5px 9px;
    overflow:hidden;
    cursor:grab;
    border:1px solid var(--hairline);
    color:var(--text-primary);
    transition:filter .15s ease, box-shadow .15s ease;
    /* pan-y (not none) so a scroll swipe that starts on a block still
       scrolls the day view natively. The move-handler below only takes
       over after a long-press confirms drag intent. */
    touch-action:pan-y;
    user-select:none;
    animation: blockIn .18s ease;
  }
  @keyframes blockIn{ from{ opacity:0; transform:translateY(4px); } to{ opacity:1; transform:none; } }
  .cal-block:hover{ filter:brightness(1.12); z-index:5; }
  .cal-block.dragging{ cursor:grabbing; z-index:20; filter:brightness(1.16); box-shadow:0 10px 28px rgba(0,0,0,0.5); }
  /* Visual hierarchy: time caption on top, large title, then (space permitting)
     a small category pill and muted notes preview. Markup order matches this. */
  .cal-block-time{
    font-family:var(--mono); font-size:10px; color:var(--text-secondary);
    letter-spacing:0.01em; white-space:nowrap; opacity:0.85;
  }
  .cal-block-title{
    display:flex; align-items:center; gap:5px; min-width:0;
    font-size:13px; font-weight:700; line-height:1.25; margin-top:1px;
  }
  .cal-block-title-text{
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  /* Always-on category indicator: a small color dot inline with the title.
     Costs zero vertical space, so it's the one thing every block shows
     regardless of height — the stacked pill below (when there's room) adds
     the readable label on top of it. Hidden when the pill is already
     visible to avoid showing the same color twice. */
  .cal-block-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .cal-block.show-pill .cal-block-dot{ display:none; }
  .cal-block.is-short .cal-block-dot{ width:5px; height:5px; }
  .cal-block-pill{
    display:none; align-items:center; gap:4px;
    font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
    padding:1px 7px; border-radius:999px; margin-top:4px;
    background:rgba(255,255,255,0.12); color:var(--text-primary);
    white-space:nowrap; max-width:100%; overflow:hidden; text-overflow:ellipsis;
  }
  .cal-block-pill-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .cal-block.show-pill .cal-block-pill{ display:inline-flex; }
  .cal-block-notes{
    display:none; font-size:10px; color:var(--text-tertiary); line-height:1.3; margin-top:4px;
    -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .cal-block.show-notes .cal-block-notes{ display:-webkit-box; }
  .cal-block.is-short{ padding:3px 9px; }
  .cal-block.is-short .cal-block-time{ display:none; }
  .cal-block.is-short .cal-block-title{ font-size:11.5px; margin-top:0; }
  .cal-block-resize{
    position:absolute; left:0; right:0; bottom:0; height:9px;
    cursor:ns-resize;
    /* Unlike the block body, this is a small, deliberate hit target —
       grabbing it always means "resize", so it keeps taking over
       immediately rather than waiting on the long-press used below. */
    touch-action:none;
  }
  .cal-block-resize::after{
    content:''; position:absolute; left:50%; bottom:2px; transform:translateX(-50%);
    width:22px; height:2px; border-radius:2px; background:rgba(255,255,255,0.22);
    opacity:0; transition:opacity .15s ease;
  }
  .cal-block:hover .cal-block-resize::after{ opacity:1; }

  /* now line */
  .cal-now{ position:absolute; left:var(--gutter); right:8px; height:0; pointer-events:none; z-index:8; }
  .cal-now::before{ content:''; position:absolute; left:0; right:0; top:-1px; height:2px; background:var(--success); box-shadow:0 0 8px rgba(107,227,164,0.6); }
  .cal-now-dot{ position:absolute; left:-4px; top:-4px; width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow:0 0 8px rgba(107,227,164,0.8); }

  /* editor modal */
  .cal-overlay{
    position:fixed; inset:0; z-index:50;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center;
    padding:18px;
  }
  .cal-overlay.open{ display:flex; }
  .cal-modal{
    width:100%; max-width:380px;
    background:#0E0E10;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
    box-shadow:0 24px 60px rgba(0,0,0,0.6);
    animation:pop .22s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes pop{ from{ opacity:0; transform:translateY(8px) scale(0.98);} to{ opacity:1; transform:none;} }
  .cal-modal h3{ margin:0 0 16px; font-size:15px; font-weight:700; letter-spacing:-0.01em; }
  .cal-field{ margin-bottom:14px; }
  .cal-field label{ display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-tertiary); margin-bottom:7px; font-weight:600; }
  .cal-input{
    width:100%; font-family:var(--font); font-size:14px; color:var(--text-primary);
    background:rgba(255,255,255,0.04); border:1px solid var(--hairline);
    border-radius:10px; padding:10px 12px; outline:none;
    transition:border-color .15s ease;
  }
  .cal-input:focus{ border-color:rgba(255,255,255,0.28); }
  .cal-textarea{
    width:100%; font-family:var(--font); font-size:13px; color:var(--text-primary);
    background:rgba(255,255,255,0.04); border:1px solid var(--hairline);
    border-radius:10px; padding:10px 12px; outline:none;
    resize:vertical; min-height:56px; max-height:160px; line-height:1.4;
    transition:border-color .15s ease;
  }
  .cal-textarea:focus{ border-color:rgba(255,255,255,0.28); }
  .cal-textarea::placeholder{ color:var(--text-tertiary); }
  .cal-times{ display:flex; gap:10px; }
  .cal-times .cal-field{ flex:1; margin-bottom:0; }
  input[type=time]{
    font-family:var(--mono); color-scheme:dark;
  }
  .cal-cats{ display:flex; flex-wrap:wrap; gap:7px; }
  .cal-cat{
    display:inline-flex; align-items:center; gap:6px;
    font-size:12px; color:var(--text-secondary);
    background:rgba(255,255,255,0.04); border:1px solid var(--hairline);
    border-radius:999px; padding:6px 11px; cursor:pointer;
    transition:border-color .15s ease, color .15s ease, background .15s ease;
  }
  .cal-cat .cal-cat-dot{ width:9px; height:9px; border-radius:3px; }
  .cal-cat.active{ color:var(--text-primary); background:rgba(255,255,255,0.08); }
  .cal-err{ font-size:11px; color:var(--danger); margin-top:8px; min-height:14px; }
  .cal-actions{ display:flex; align-items:center; gap:10px; margin-top:18px; }
  .cal-del{
    background:transparent; border:none; color:var(--text-tertiary);
    font-family:var(--font); font-size:13px; cursor:pointer; padding:8px 4px;
    transition:color .15s ease;
  }
  .cal-del:hover{ color:var(--danger); }
  .cal-spacer{ flex:1; }
  .cal-cancel{
    background:rgba(255,255,255,0.04); border:1px solid var(--hairline); color:var(--text-secondary);
    border-radius:10px; padding:9px 16px; cursor:pointer; font-size:13px; font-weight:600; font-family:var(--font);
    transition:background .15s ease;
  }
  .cal-cancel:hover{ background:rgba(255,255,255,0.08); }
  .cal-save{
    background:linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
    color:#0A0A0B; font-weight:700; border:none; border-radius:10px;
    padding:9px 18px; cursor:pointer; font-size:13px; font-family:var(--font);
    box-shadow:0 1px 0 rgba(255,255,255,0.6) inset;
    transition:transform .12s ease, filter .15s ease;
  }
  .cal-save:hover{ transform:translateY(-1px); filter:brightness(1.04); }

  /* Category select header — label + "manage categories" trigger */
  .cal-cats-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:7px; }
  .cal-cats-head label{ margin-bottom:0; }
  .cat-mgr-trigger{
    background:transparent; border:none; color:var(--text-tertiary);
    font-family:var(--font); font-size:11px; font-weight:600; cursor:pointer;
    padding:3px 7px; border-radius:6px;
    transition:color .15s ease, background .15s ease;
  }
  .cat-mgr-trigger:hover{ color:var(--text-primary); background:rgba(255,255,255,0.06); }

  /* Category manager modal */
  .cat-mgr-modal{ max-width:420px; }
  .cat-mgr-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cat-mgr-head h3{ margin:0; }
  .cat-mgr-close{
    background:transparent; border:none; color:var(--text-tertiary);
    font-size:20px; line-height:1; cursor:pointer; padding:2px 7px; border-radius:6px;
    transition:color .15s ease, background .15s ease;
  }
  .cat-mgr-close:hover{ color:var(--text-primary); background:rgba(255,255,255,0.06); }

  .cat-mgr-list{ display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; margin-bottom:12px; }
  .cat-mgr-row{
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    padding:8px 10px; border-radius:10px; background:rgba(255,255,255,0.03);
  }
  .cat-mgr-dot{ width:11px; height:11px; border-radius:3px; flex-shrink:0; }
  .cat-mgr-name{
    flex:1; font-size:13px; color:var(--text-primary); min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cat-mgr-lock{ font-size:11px; opacity:0.55; flex-shrink:0; }
  .cat-mgr-edit, .cat-mgr-del{
    background:transparent; border:none; color:var(--text-tertiary);
    cursor:pointer; font-size:13px; padding:4px 6px; border-radius:6px; flex-shrink:0;
    font-family:inherit;
    transition:color .15s ease, background .15s ease;
  }
  .cat-mgr-edit:hover{ color:var(--text-primary); background:rgba(255,255,255,0.06); }
  .cat-mgr-del:hover{ color:var(--danger); background:rgba(255,107,107,0.08); }
  .cat-mgr-del.is-confirm{ color:var(--danger); background:rgba(255,107,107,0.14); font-size:11px; padding:4px 8px; white-space:nowrap; font-weight:600; }
  .cat-mgr-del:disabled{ opacity:0.3; cursor:not-allowed; }

  .cat-mgr-edit-form{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; width:100%; }
  .cat-mgr-edit-input{ flex:1; min-width:100px; padding:7px 10px; font-size:13px; }
  .cat-mgr-edit-form .cat-mgr-save, .cat-mgr-edit-form .cat-mgr-cancel{
    font-family:var(--font); font-size:12px; font-weight:600; padding:7px 12px;
    border-radius:8px; cursor:pointer; border:1px solid var(--hairline);
  }
  .cat-mgr-edit-form .cat-mgr-save{ background:linear-gradient(180deg,#FFFFFF,#E8E5DD); color:#0A0A0B; border:none; }
  .cat-mgr-edit-form .cat-mgr-cancel{ background:rgba(255,255,255,0.04); color:var(--text-secondary); }

  .cat-mgr-swatches{ display:flex; flex-wrap:wrap; gap:6px; }
  .cat-mgr-swatch{
    width:20px; height:20px; border-radius:50%; cursor:pointer;
    border:2px solid transparent; box-sizing:border-box; padding:0;
    transition:transform .12s ease, border-color .15s ease;
  }
  .cat-mgr-swatch:hover{ transform:scale(1.1); }
  .cat-mgr-swatch.active{ border-color:#FFFFFF; }

  .cat-mgr-add{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding-top:10px; border-top:1px solid var(--hairline); }
  .cat-mgr-add-input{ flex:1; min-width:120px; padding:8px 10px; font-size:13px; }
  .cat-mgr-add-btn{
    background:linear-gradient(180deg,#FFFFFF,#E8E5DD); color:#0A0A0B; font-weight:700;
    border:none; border-radius:10px; width:34px; height:34px; font-size:16px; cursor:pointer;
    flex-shrink:0; font-family:inherit;
  }

  @media (max-width:480px){
    :root{ --gutter:46px; }
    .cal-card{ padding:16px; }
    .cal-date-main{ font-size:15px; }
    .cal-legend{ display:none; }
    .cal-scroll{ max-height:calc(100dvh - 240px); }

    /* Header: stack into clean rows instead of an uneven wrap. Date gets
       its own row, the three step/today buttons share a row at a proper
       44px tap height, and the add button becomes a full-width primary CTA. */
    .cal-head{ flex-wrap:wrap; gap:10px; }
    .cal-date{ flex:1 1 100%; }
    .cal-nav{ flex:1 1 100%; margin-left:0; flex-wrap:wrap; gap:8px; }
    .cal-nav > button:not(.cal-add){ flex:1; height:44px; min-width:44px; font-size:14px; }
    .cal-add{ flex-basis:100%; height:44px; padding:0 12px; }

    /* Category-manager trigger: small but still comfortably tappable */
    .cat-mgr-trigger{ padding:7px 10px; font-size:12px; }

    /* Resize handle: enlarge the invisible hit area (not the visual grip)
       so it's reachable with a finger, especially on short blocks. */
    .cal-block-resize{ height:16px; bottom:-3px; }

    /* Editor + category-manager modals: anchor as a bottom sheet so the
       on-screen keyboard never pushes content off-screen unreachably —
       capped height with internal scroll instead of centered+overflowing. */
    .cal-overlay{ align-items:flex-end; padding:0; }
    .cal-modal{
      max-width:100%; border-radius:18px 18px 0 0;
      max-height:88dvh; overflow-y:auto;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      animation: sheetUp .22s cubic-bezier(0.22,1,0.36,1);
    }
  }
  @keyframes sheetUp{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="section-title">Day Planner</div>
    <div class="cal-card">

      <div class="cal-head">
        <div class="cal-date">
          <span class="cal-date-main" id="calDateMain">—</span>
          <span class="cal-date-sub" id="calDateSub">—</span>
        </div>
        <div class="cal-nav">
          <button id="calPrev" aria-label="Előző nap">‹</button>
          <button class="cal-today" id="calTodayBtn">Ma</button>
          <button id="calNext" aria-label="Következő nap">›</button>
          <button class="cal-add" id="calAddBtn">+ Új blokk</button>
        </div>
      </div>

      <div class="cal-meta">
        <span class="cal-stats" id="calStats">0 blokk · 0 ó</span>
        <div class="cal-legend" id="calLegend"></div>
      </div>

      <div class="cal-scroll" id="calScroll">
        <div class="cal-grid" id="calGrid">
          <div class="cal-blocks" id="calBlocks"></div>
          <div class="cal-now" id="calNow" style="display:none"><span class="cal-now-dot"></span></div>
        </div>
      </div>

    </div>
  </div>

  <!-- editor modal -->
  <div class="cal-overlay" id="calOverlay">
    <div class="cal-modal" role="dialog" aria-modal="true">
      <h3 id="calModalTitle">Új blokk</h3>
      <div class="cal-field">
        <label for="calTitle">Mit csinálsz?</label>
        <input class="cal-input" id="calTitle" type="text" placeholder="pl. Futás + húzódzkodás" autocomplete="off" />
      </div>
      <div class="cal-times">
        <div class="cal-field">
          <label for="calStart">Kezdés</label>
          <input class="cal-input" id="calStart" type="time" step="900" />
        </div>
        <div class="cal-field">
          <label for="calEnd">Vége</label>
          <input class="cal-input" id="calEnd" type="time" step="900" />
        </div>
      </div>
      <div class="cal-field" style="margin-top:14px">
        <div class="cal-cats-head">
          <label style="margin-bottom:0">Kategória</label>
          <button type="button" class="cat-mgr-trigger" id="catMgrOpenBtn" title="Kategóriák kezelése">⚙ Kezelés</button>
        </div>
        <div class="cal-cats" id="calCats"></div>
      </div>
      <div class="cal-field">
        <label for="calNotes">Megjegyzés</label>
        <textarea class="cal-textarea" id="calNotes" placeholder="Opcionális megjegyzés…"></textarea>
      </div>
      <div class="cal-err" id="calErr"></div>
      <div class="cal-actions">
        <button class="cal-del" id="calDelBtn" style="display:none">Törlés</button>
        <span class="cal-spacer"></span>
        <button class="cal-cancel" id="calCancelBtn">Mégse</button>
        <button class="cal-save" id="calSaveBtn">Mentés</button>
      </div>
    </div>
  </div>

  <!-- category manager modal -->
  <div class="cal-overlay" id="catMgrOverlay">
    <div class="cal-modal cat-mgr-modal" role="dialog" aria-modal="true">
      <div class="cat-mgr-head">
        <h3>Kategóriák kezelése</h3>
        <button class="cat-mgr-close" id="catMgrCloseBtn" aria-label="Bezárás" type="button">×</button>
      </div>
      <div class="cat-mgr-list" id="catMgrList"></div>
      <div class="cat-mgr-add">
        <div class="cat-mgr-swatches" id="catMgrAddSwatches"></div>
        <input class="cal-input cat-mgr-add-input" id="catMgrAddName" type="text" placeholder="Új kategória neve" autocomplete="off" />
        <button class="cat-mgr-add-btn" id="catMgrAddBtn" aria-label="Hozzáadás" type="button">+</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  const START_HOUR = 6;
  const END_HOUR   = 24;
  const HOURS      = END_HOUR - START_HOUR;
  const HOUR_PX    = 64;
  const SNAP_MIN   = 15;

  // Categories used to be a hardcoded object. They're now stored in
  // localStorage under CATS_KEY so users can add/rename/delete their own,
  // while built-in ones stay (renameable but not deletable) so existing
  // blocks referencing 'training', 'work', etc. keep resolving correctly.
  const CATS_KEY = 'dayplanner_categories';
  const DEFAULT_CATEGORIES = [
    { key:'training',      label:'Edzés',           color:'#6BE3A4', builtin:true },
    { key:'work',          label:'Munka',           color:'#F36F4F', builtin:true },
    { key:'focus',         label:'Fókusz',          color:'#6AA8FF', builtin:true },
    { key:'meal',          label:'Étkezés',         color:'#F2C063', builtin:true },
    { key:'rest',          label:'Pihenés',         color:'#9B7BD4', builtin:true },
    { key:'other',         label:'Egyéb',           color:'#9A98A4', builtin:true },
    { key:'uncategorized', label:'Nincs kategória', color:'#5A5852', builtin:true }
  ];
  const PALETTE = ['#6BE3A4','#F36F4F','#6AA8FF','#F2C063','#9B7BD4','#9A98A4','#FF8FA3','#5FD0D9','#E0A85C','#7DD3FC'];

  function escAttr(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // Idempotent: seeds the default set on first run, and backfills the
  // 'uncategorized' fallback if older saved data predates it.
  function loadCategories(){
    let cats = storeGet(CATS_KEY);
    if(!Array.isArray(cats) || !cats.length){
      cats = DEFAULT_CATEGORIES.map(c=>({...c}));
      storeSet(CATS_KEY, cats);
      return cats;
    }
    if(!cats.some(c=>c.key==='uncategorized')){
      cats.push({ key:'uncategorized', label:'Nincs kategória', color:'#5A5852', builtin:true });
      storeSet(CATS_KEY, cats);
    }
    return cats;
  }
  function saveCategories(cats){ storeSet(CATS_KEY, cats); }
  function getCategoryMap(){
    const map = {};
    loadCategories().forEach(c=>{ map[c.key] = c; });
    return map;
  }
  function catKeyFromLabel(label){
    const base = String(label).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'cat';
    const existing = loadCategories().map(c=>c.key);
    let key = base, n = 1;
    while(existing.includes(key)){ key = base+'-'+(++n); }
    return key;
  }

  const WEEKDAYS = ['Vasárnap','Hétfő','Kedd','Szerda','Csütörtök','Péntek','Szombat'];
  const MONTHS   = ['jan.','feb.','márc.','ápr.','máj.','jún.','júl.','aug.','szept.','okt.','nov.','dec.'];

  const grid     = document.getElementById('calGrid');
  const blocksEl = document.getElementById('calBlocks');
  const scrollEl = document.getElementById('calScroll');
  const nowEl    = document.getElementById('calNow');
  const dateMain = document.getElementById('calDateMain');
  const dateSub  = document.getElementById('calDateSub');
  const statsEl  = document.getElementById('calStats');
  const legendEl = document.getElementById('calLegend');

  const overlay    = document.getElementById('calOverlay');
  const modalTitle = document.getElementById('calModalTitle');
  const fTitle = document.getElementById('calTitle');
  const fStart = document.getElementById('calStart');
  const fEnd   = document.getElementById('calEnd');
  const catsEl = document.getElementById('calCats');
  const fNotes = document.getElementById('calNotes');
  const errEl  = document.getElementById('calErr');
  const delBtn = document.getElementById('calDelBtn');

  const catMgrOpenBtn     = document.getElementById('catMgrOpenBtn');
  const catMgrOverlay     = document.getElementById('catMgrOverlay');
  const catMgrCloseBtn    = document.getElementById('catMgrCloseBtn');
  const catMgrList        = document.getElementById('catMgrList');
  const catMgrAddSwatches = document.getElementById('catMgrAddSwatches');
  const catMgrAddName     = document.getElementById('catMgrAddName');
  const catMgrAddBtn      = document.getElementById('catMgrAddBtn');

  let activeDate = new Date();
  let editingId  = null;
  let editingCat = 'focus';
  let catMgrDelPending = null;
  let catMgrDelTimer   = null;
  let catMgrAddColor   = PALETTE[0];

  function storeGet(k){ try{ const v = localStorage.getItem(k); return v? JSON.parse(v): null; }catch(e){ return null; } }
  function storeSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  function uid(){ return 'b'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  function pad2(n){ return n<10? '0'+n : ''+n; }
  function dateKey(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
  function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function scheduleKey(d){ return 'schedule:'+dateKey(d); }

  function toMin(hhmm){ const p = hhmm.split(':'); return (+p[0])*60 + (+p[1]); }
  function minToTime(m){ m = Math.max(0, Math.min(1440, Math.round(m))); return pad2(Math.floor(m/60))+':'+pad2(m%60); }
  function toInputTime(t){ return t==='24:00' ? '23:59' : t; }
  function fmtTime(m){ return pad2(Math.floor(m/60))+':'+pad2(m%60); }
  function snap(m){ return Math.round(m/SNAP_MIN)*SNAP_MIN; }
  function clampMin(m){ return Math.max(START_HOUR*60, Math.min(END_HOUR*60, m)); }

  function minToY(absMin){ return ((absMin - START_HOUR*60)/60)*HOUR_PX; }
  function yToMin(y){ return START_HOUR*60 + (y/HOUR_PX)*60; }

  function hexToRgba(hex, a){
    const h = hex.replace('#','');
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  function getBlocks(){ const v = storeGet(scheduleKey(activeDate)); return Array.isArray(v)? v : []; }
  function setBlocks(arr){ storeSet(scheduleKey(activeDate), arr); }

  function buildGrid(){
    grid.style.height = (HOURS*HOUR_PX)+'px';
    grid.querySelectorAll('.cal-hline, .cal-hlabel').forEach(n=>n.remove());
    const frag = document.createDocumentFragment();
    for(let h=START_HOUR; h<=END_HOUR; h++){
      const y = (h-START_HOUR)*HOUR_PX;
      const line = document.createElement('div');
      line.className = 'cal-hline';
      line.style.top = y+'px';
      frag.appendChild(line);
      if(h < END_HOUR){
        const half = document.createElement('div');
        half.className = 'cal-hline half';
        half.style.top = (y+HOUR_PX/2)+'px';
        frag.appendChild(half);
      }
      const lbl = document.createElement('div');
      lbl.className = 'cal-hlabel';
      lbl.style.top = y+'px';
      lbl.textContent = (h===24? '0' : h)+':00';
      frag.appendChild(lbl);
    }
    grid.insertBefore(frag, blocksEl);
  }

  function layout(blocks){
    const items = blocks.map(b=>({ ref:b, s:toMin(b.start), e:toMin(b.end) }))
                        .filter(it=> it.e > it.s)
                        .sort((a,b)=> a.s-b.s || a.e-b.e);
    let i=0;
    const out=[];
    while(i<items.length){
      const cluster=[items[i]];
      let end=items[i].e;
      let j=i+1;
      while(j<items.length && items[j].s < end){ cluster.push(items[j]); end=Math.max(end, items[j].e); j++; }
      const colEnd=[];
      for(const it of cluster){
        let placed=false;
        for(let c=0;c<colEnd.length;c++){
          if(it.s >= colEnd[c]){ it.col=c; colEnd[c]=it.e; placed=true; break; }
        }
        if(!placed){ it.col=colEnd.length; colEnd.push(it.e); }
      }
      const n=colEnd.length;
      for(const it of cluster){ it.n=n; out.push(it); }
      i=j;
    }
    return out;
  }

  function render(){
    blocksEl.querySelectorAll('.cal-block, .cal-empty-hint').forEach(n=>n.remove());
    const blocks = getBlocks();

    if(blocks.length===0){
      const hint = document.createElement('div');
      hint.className='cal-empty-hint';
      hint.innerHTML = '<div class="cal-empty-icon">📅</div><div class="cal-empty-msg">Még nincs tervezett blokk — koppints az idősávra, vagy nyomd meg a "+ Új blokk" gombot.</div>';
      blocksEl.appendChild(hint);
    }

    const laid = layout(blocks);
    const catMap = getCategoryMap();
    const gap = 4;
    for(const it of laid){
      const b = it.ref;
      const cat = catMap[b.cat] || catMap.uncategorized;
      const top = minToY(it.s);
      const h = Math.max(20, minToY(it.e)-minToY(it.s));
      const widthPct = 100/it.n;
      const hasNotes = !!(b.notes && b.notes.trim());
      const el = document.createElement('div');
      el.className = 'cal-block'
        + (h<40 ? ' is-short' : '')
        + (h>=48 ? ' show-pill' : '')
        + (h>=72 && hasNotes ? ' show-notes' : '');
      el.dataset.id = b.id;
      el.style.top = top+'px';
      el.style.height = (h-2)+'px';
      el.style.left = 'calc('+(it.col*widthPct)+'% + '+(it.col?gap/2:0)+'px)';
      el.style.width = 'calc('+widthPct+'% - '+gap+'px)';
      el.style.background = hexToRgba(cat.color, 0.16);
      el.style.boxShadow = 'inset 3px 0 0 0 '+cat.color;
      el.innerHTML =
        '<div class="cal-block-time"></div>'+
        '<div class="cal-block-title"><span class="cal-block-dot"></span><span class="cal-block-title-text"></span></div>'+
        '<div class="cal-block-pill"><span class="cal-block-pill-dot" style="background:'+cat.color+'"></span><span class="cal-block-pill-label"></span></div>'+
        '<div class="cal-block-notes"></div>'+
        '<div class="cal-block-resize"></div>';
      el.querySelector('.cal-block-time').textContent = fmtTime(it.s)+' – '+fmtTime(it.e);
      el.querySelector('.cal-block-dot').style.background = cat.color;
      el.querySelector('.cal-block-title-text').textContent = b.title || '(névtelen)';
      el.querySelector('.cal-block-pill-label').textContent = cat.label;
      el.querySelector('.cal-block-notes').textContent = b.notes || '';
      // Blocks too short for the stacked pill (<48px) still need the category
      // retrievable without opening the editor — a native tooltip covers that
      // on hover/tap, on top of the always-visible color dot.
      if(h < 48) el.title = (b.title || '(névtelen)') + ' · ' + cat.label;
      wireBlock(el, b);
      blocksEl.appendChild(el);
    }

    renderStats(blocks);
    renderNow();
  }

  function renderStats(blocks){
    const n = blocks.length;
    let mins = 0;
    for(const b of blocks){ mins += Math.max(0, toMin(b.end)-toMin(b.start)); }
    const hrs = (mins/60).toFixed(1).replace('.', ',').replace(',0','');
    statsEl.textContent = n+' blokk · '+hrs+' ó tervezve';
  }

  function renderNow(){
    if(!isSameDay(activeDate, new Date())){ nowEl.style.display='none'; return; }
    const now = new Date();
    const m = now.getHours()*60 + now.getMinutes();
    if(m < START_HOUR*60 || m > END_HOUR*60){ nowEl.style.display='none'; return; }
    nowEl.style.display='block';
    nowEl.style.top = minToY(m)+'px';
  }

  function wireBlock(el, b){
    const resize = el.querySelector('.cal-block-resize');

    resize.addEventListener('pointerdown', (e)=>{
      e.stopPropagation();
      e.preventDefault();
      const startY = e.clientY;
      const origEnd = toMin(b.end);
      const origStart = toMin(b.start);
      el.classList.add('dragging');
      el.setPointerCapture(e.pointerId);

      function move(ev){
        const dMin = ((ev.clientY-startY)/HOUR_PX)*60;
        let newEnd = clampMin(snap(origEnd + dMin));
        if(newEnd <= origStart + SNAP_MIN) newEnd = origStart + SNAP_MIN;
        el.style.height = Math.max(20, minToY(newEnd)-minToY(origStart)-2)+'px';
        const t = el.querySelector('.cal-block-time');
        if(t) t.textContent = fmtTime(origStart)+' – '+fmtTime(newEnd);
      }
      function up(ev){
        el.releasePointerCapture(e.pointerId);
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
        el.classList.remove('dragging');
        const dMin = ((ev.clientY-startY)/HOUR_PX)*60;
        let newEnd = clampMin(snap(origEnd + dMin));
        if(newEnd <= origStart + SNAP_MIN) newEnd = origStart + SNAP_MIN;
        commit(b.id, { end: minToTime(newEnd) });
      }
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
    });

    // Move (drag-to-reschedule). Mouse keeps the original immediate
    // click-vs-drag behavior unchanged — a mouse drag on the block body is
    // never ambiguous with scrolling, since wheel/scrollbar are a separate
    // input channel. Touch/pen require a long-press before arming: a plain
    // scroll swipe moves several px well within LONGPRESS_MS, so it never
    // reaches arming and falls straight through to native pan-y scrolling
    // (no preventDefault/setPointerCapture happens until armed).
    const LONGPRESS_MS = 350;
    const TAP_JITTER = 8; // px of movement tolerated before long-press fires
    el.addEventListener('pointerdown', (e)=>{
      if(e.target === resize) return;
      const origStart = toMin(b.start);
      const dur = toMin(b.end) - origStart;

      if(e.pointerType === 'mouse'){
        e.preventDefault();
        const startY = e.clientY;
        let moved = false;
        el.setPointerCapture(e.pointerId);
        function move(ev){
          const dy = ev.clientY-startY;
          if(Math.abs(dy) > 3) moved = true;
          if(!moved) return;
          el.classList.add('dragging');
          const dMin = (dy/HOUR_PX)*60;
          let newStart = snap(origStart + dMin);
          newStart = Math.max(START_HOUR*60, Math.min(END_HOUR*60 - dur, newStart));
          el.style.top = minToY(newStart)+'px';
          const t = el.querySelector('.cal-block-time');
          if(t) t.textContent = fmtTime(newStart)+' – '+fmtTime(newStart+dur);
        }
        function up(ev){
          el.releasePointerCapture(e.pointerId);
          el.removeEventListener('pointermove', move);
          el.removeEventListener('pointerup', up);
          el.classList.remove('dragging');
          if(!moved){ openEditor(b.id); return; }
          const dMin = ((ev.clientY-startY)/HOUR_PX)*60;
          let newStart = snap(origStart + dMin);
          newStart = Math.max(START_HOUR*60, Math.min(END_HOUR*60 - dur, newStart));
          commit(b.id, { start: minToTime(newStart), end: minToTime(newStart+dur) });
        }
        el.addEventListener('pointermove', move);
        el.addEventListener('pointerup', up);
        return;
      }

      const startX = e.clientX;
      const startY = e.clientY;
      let lastY = startY;
      let armed = false;
      let cancelled = false;
      let baseY = startY;

      const armTimer = setTimeout(() => {
        if(cancelled) return;
        armed = true;
        baseY = lastY;
        el.setPointerCapture(e.pointerId);
        el.classList.add('dragging');
      }, LONGPRESS_MS);

      function move(ev){
        lastY = ev.clientY;
        if(!armed){
          const dx = ev.clientX-startX, dy = ev.clientY-startY;
          if(Math.hypot(dx, dy) > TAP_JITTER){
            // Moved too far before the long-press fired — this is a scroll,
            // not a drag. Bail out and let native scrolling keep handling it.
            cancelled = true;
            clearTimeout(armTimer);
            el.removeEventListener('pointermove', move);
            el.removeEventListener('pointerup', up);
          }
          return;
        }
        if(ev.cancelable) ev.preventDefault();
        const dMin = ((ev.clientY-baseY)/HOUR_PX)*60;
        let newStart = snap(origStart + dMin);
        newStart = Math.max(START_HOUR*60, Math.min(END_HOUR*60 - dur, newStart));
        el.style.top = minToY(newStart)+'px';
        const t = el.querySelector('.cal-block-time');
        if(t) t.textContent = fmtTime(newStart)+' – '+fmtTime(newStart+dur);
      }
      function up(ev){
        clearTimeout(armTimer);
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
        if(cancelled) return;
        if(!armed){
          openEditor(b.id);
          return;
        }
        el.releasePointerCapture(e.pointerId);
        el.classList.remove('dragging');
        const dMin = ((ev.clientY-baseY)/HOUR_PX)*60;
        let newStart = snap(origStart + dMin);
        newStart = Math.max(START_HOUR*60, Math.min(END_HOUR*60 - dur, newStart));
        commit(b.id, { start: minToTime(newStart), end: minToTime(newStart+dur) });
      }
      el.addEventListener('pointermove', move, { passive:false });
      el.addEventListener('pointerup', up);
    });
  }

  function commit(id, patch){
    const blocks = getBlocks();
    const idx = blocks.findIndex(x=>x.id===id);
    if(idx<0) return;
    Object.assign(blocks[idx], patch);
    setBlocks(blocks);
    render();
  }

  blocksEl.addEventListener('click', (e)=>{
    if(e.target !== blocksEl) return;
    const rect = blocksEl.getBoundingClientRect();
    const y = e.clientY - rect.top;
    let startMin = clampMin(snap(yToMin(y)));
    if(startMin >= END_HOUR*60 - SNAP_MIN) startMin = END_HOUR*60 - 60;
    let endMin = Math.min(END_HOUR*60, startMin + 60);
    openEditor(null, { start: minToTime(startMin), end: minToTime(endMin) });
  });

  function buildCatChips(){
    catsEl.innerHTML='';
    loadCategories().forEach(c=>{
      const chip = document.createElement('button');
      chip.type='button';
      chip.className='cal-cat'+(c.key===editingCat?' active':'');
      chip.dataset.cat=c.key;
      chip.innerHTML='<span class="cal-cat-dot" style="background:'+c.color+'"></span>'+escAttr(c.label);
      chip.addEventListener('click', ()=>{
        editingCat=c.key;
        catsEl.querySelectorAll('.cal-cat').forEach(x=>x.classList.toggle('active', x.dataset.cat===c.key));
      });
      catsEl.appendChild(chip);
    });
  }

  function openEditor(id, prefill){
    editingId = id;
    errEl.textContent='';
    if(id){
      const b = getBlocks().find(x=>x.id===id);
      if(!b) return;
      modalTitle.textContent='Blokk szerkesztése';
      fTitle.value = b.title || '';
      fStart.value = toInputTime(b.start);
      fEnd.value = toInputTime(b.end);
      fNotes.value = b.notes || '';
      editingCat = b.cat || 'focus';
      delBtn.style.display='inline-block';
    }else{
      modalTitle.textContent='Új blokk';
      fTitle.value='';
      fStart.value = prefill ? prefill.start : '09:00';
      fEnd.value   = prefill ? prefill.end   : '10:00';
      fNotes.value = '';
      editingCat = 'focus';
      delBtn.style.display='none';
    }
    buildCatChips();
    overlay.classList.add('open');
    setTimeout(()=>fTitle.focus(), 30);
  }

  function closeEditor(){ overlay.classList.remove('open'); editingId=null; }

  function saveEditor(){
    const title = fTitle.value.trim();
    const start = fStart.value, end = fEnd.value;
    const notes = fNotes.value.trim();
    if(!start || !end){ errEl.textContent='Adj meg kezdő és befejező időt.'; return; }
    if(toMin(end) <= toMin(start)){ errEl.textContent='A vége legyen a kezdés után.'; return; }
    const blocks = getBlocks();
    if(editingId){
      const idx = blocks.findIndex(x=>x.id===editingId);
      if(idx>=0) Object.assign(blocks[idx], { title: title || '(névtelen)', start, end, cat: editingCat, notes });
    }else{
      blocks.push({ id: uid(), title: title || '(névtelen)', start, end, cat: editingCat, notes });
    }
    setBlocks(blocks);
    closeEditor();
    render();
  }

  function deleteEditing(){
    if(!editingId) return;
    const blocks = getBlocks().filter(x=>x.id!==editingId);
    setBlocks(blocks);
    closeEditor();
    render();
  }

  document.getElementById('calSaveBtn').addEventListener('click', saveEditor);
  document.getElementById('calCancelBtn').addEventListener('click', closeEditor);
  delBtn.addEventListener('click', deleteEditing);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeEditor(); });
  fTitle.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); saveEditor(); } });
  // The category manager can be opened on top of this modal — if it's open,
  // let its own Escape handler close that one first instead of both at once.
  document.addEventListener('keydown', (e)=>{
    if(e.key!=='Escape' || catMgrOverlay.classList.contains('open')) return;
    if(overlay.classList.contains('open')) closeEditor();
  });

  document.getElementById('calAddBtn').addEventListener('click', ()=>{
    const now = new Date();
    let startMin;
    if(isSameDay(activeDate, now)){
      startMin = clampMin(snap(now.getHours()*60 + now.getMinutes()));
    }else{
      startMin = 9*60;
    }
    if(startMin >= END_HOUR*60 - SNAP_MIN) startMin = END_HOUR*60 - 60;
    openEditor(null, { start: minToTime(startMin), end: minToTime(Math.min(END_HOUR*60, startMin+60)) });
  });

  // ============================================================
  // CATEGORY MANAGER — add/rename/recolor/delete custom categories.
  // Built-in categories (the original hardcoded set) can be renamed and
  // recolored but never deleted, since existing blocks reference them by
  // key. Deleting a custom category reassigns every block that used it
  // (across all dates) to the permanent 'uncategorized' fallback rather
  // than deleting those blocks.
  // ============================================================
  function buildSwatches(container, selectedColor, onPick){
    container.innerHTML = PALETTE.map(c =>
      '<span class="cat-mgr-swatch'+(c===selectedColor?' active':'')+'" data-color="'+c+'" style="background:'+c+'"></span>'
    ).join('');
    container.querySelectorAll('.cat-mgr-swatch').forEach(sw=>{
      sw.addEventListener('click', ()=>{
        container.querySelectorAll('.cat-mgr-swatch').forEach(x=>x.classList.remove('active'));
        sw.classList.add('active');
        onPick(sw.dataset.color);
      });
    });
  }

  function openCatMgr(){
    catMgrDelPending = null;
    if(catMgrDelTimer){ clearTimeout(catMgrDelTimer); catMgrDelTimer=null; }
    renderCatMgrList();
    catMgrAddName.value='';
    catMgrAddColor = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    buildSwatches(catMgrAddSwatches, catMgrAddColor, (c)=>{ catMgrAddColor=c; });
    catMgrOverlay.classList.add('open');
  }
  function closeCatMgr(){
    catMgrOverlay.classList.remove('open');
    catMgrDelPending = null;
    if(catMgrDelTimer){ clearTimeout(catMgrDelTimer); catMgrDelTimer=null; }
  }

  function renderCatMgrList(){
    const cats = loadCategories();
    catMgrList.innerHTML = cats.map(c=>{
      const lockHtml = c.builtin ? '<span class="cat-mgr-lock" title="Beépített kategória, nem törölhető">🔒</span>' : '';
      const delBtnHtml = c.builtin
        ? '<button class="cat-mgr-del" disabled title="Beépített kategória, nem törölhető" type="button">🗑</button>'
        : '<button class="cat-mgr-del'+(catMgrDelPending===c.key?' is-confirm':'')+'" data-del="'+c.key+'" type="button">'+(catMgrDelPending===c.key?'Biztos?':'🗑')+'</button>';
      return '<div class="cat-mgr-row" data-key="'+c.key+'">'
        + '<span class="cat-mgr-dot" style="background:'+c.color+'"></span>'
        + '<span class="cat-mgr-name">'+escAttr(c.label)+'</span>'
        + lockHtml
        + '<button class="cat-mgr-edit" data-edit="'+c.key+'" title="Szerkesztés" type="button">✏</button>'
        + delBtnHtml
        + '</div>';
    }).join('');
    catMgrList.querySelectorAll('[data-edit]').forEach(b=>{
      b.addEventListener('click', ()=>openCatMgrEdit(b.dataset.edit));
    });
    catMgrList.querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click', ()=>handleCatDeleteClick(b.dataset.del));
    });
  }

  // First click arms a 3s "Biztos?" confirm state; a second click within
  // that window actually deletes. Mirrors the press-twice pattern used
  // elsewhere in the dashboard for destructive actions.
  function handleCatDeleteClick(key){
    if(catMgrDelPending === key){
      if(catMgrDelTimer){ clearTimeout(catMgrDelTimer); catMgrDelTimer=null; }
      catMgrDelPending = null;
      deleteCategory(key);
      return;
    }
    catMgrDelPending = key;
    renderCatMgrList();
    if(catMgrDelTimer) clearTimeout(catMgrDelTimer);
    catMgrDelTimer = setTimeout(()=>{
      catMgrDelPending = null;
      renderCatMgrList();
    }, 3000);
  }

  function refreshCategoryDependentUI(){
    renderLegend();
    render();
    if(overlay.classList.contains('open')) buildCatChips();
  }

  function deleteCategory(key){
    let cats = loadCategories();
    const target = cats.find(c=>c.key===key);
    if(!target || target.builtin) return;
    cats = cats.filter(c=>c.key!==key);
    saveCategories(cats);
    reassignBlocksFromDeletedCategory(key);
    renderCatMgrList();
    refreshCategoryDependentUI();
  }

  // Walk every date-keyed schedule entry in localStorage (not just the
  // currently viewed date) and reassign blocks that used the deleted
  // category to the permanent 'uncategorized' fallback. Blocks themselves
  // are never deleted.
  function reassignBlocksFromDeletedCategory(deletedKey){
    for(let i=0; i<localStorage.length; i++){
      const k = localStorage.key(i);
      if(!k || !k.startsWith('schedule:')) continue;
      const blocks = storeGet(k);
      if(!Array.isArray(blocks)) continue;
      let changed = false;
      blocks.forEach(b=>{
        if(b.cat === deletedKey){ b.cat = 'uncategorized'; changed = true; }
      });
      if(changed) storeSet(k, blocks);
    }
  }

  function openCatMgrEdit(key){
    const cats = loadCategories();
    const cat = cats.find(c=>c.key===key);
    if(!cat) return;
    const row = catMgrList.querySelector('.cat-mgr-row[data-key="'+key+'"]');
    if(!row) return;
    let editColor = cat.color;
    row.innerHTML = '<div class="cat-mgr-edit-form">'
      + '<div class="cat-mgr-swatches" id="catMgrEditSwatches"></div>'
      + '<input class="cal-input cat-mgr-edit-input" id="catMgrEditName" value="'+escAttr(cat.label)+'" />'
      + '<button class="cat-mgr-save" type="button">Mentés</button>'
      + '<button class="cat-mgr-cancel" type="button">Mégse</button>'
      + '</div>';
    buildSwatches(row.querySelector('#catMgrEditSwatches'), editColor, (c)=>{ editColor=c; });
    const nameInput = row.querySelector('#catMgrEditName');
    setTimeout(()=>{ nameInput.focus(); nameInput.select(); }, 0);
    const save = () => {
      const newLabel = nameInput.value.trim();
      if(!newLabel) return;
      cat.label = newLabel;
      cat.color = editColor;
      saveCategories(cats);
      renderCatMgrList();
      refreshCategoryDependentUI();
    };
    row.querySelector('.cat-mgr-save').addEventListener('click', save);
    row.querySelector('.cat-mgr-cancel').addEventListener('click', renderCatMgrList);
    nameInput.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){ e.preventDefault(); save(); }
      else if(e.key==='Escape'){ renderCatMgrList(); }
    });
  }

  function addCategory(){
    const name = catMgrAddName.value.trim();
    if(!name){ catMgrAddName.focus(); return; }
    const cats = loadCategories();
    const key = catKeyFromLabel(name);
    const newCat = { key, label:name, color:catMgrAddColor, builtin:false };
    const uncatIdx = cats.findIndex(c=>c.key==='uncategorized');
    if(uncatIdx >= 0) cats.splice(uncatIdx, 0, newCat); else cats.push(newCat);
    saveCategories(cats);
    catMgrAddName.value='';
    catMgrAddColor = PALETTE[Math.floor(Math.random()*PALETTE.length)];
    buildSwatches(catMgrAddSwatches, catMgrAddColor, (c)=>{ catMgrAddColor=c; });
    renderCatMgrList();
    refreshCategoryDependentUI();
  }

  catMgrOpenBtn.addEventListener('click', openCatMgr);
  catMgrCloseBtn.addEventListener('click', closeCatMgr);
  catMgrOverlay.addEventListener('click', (e)=>{ if(e.target===catMgrOverlay) closeCatMgr(); });
  catMgrAddBtn.addEventListener('click', addCategory);
  catMgrAddName.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); addCategory(); } });
  document.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && catMgrOverlay.classList.contains('open')) closeCatMgr(); });

  function shiftDay(delta){ const d = new Date(activeDate); d.setDate(d.getDate()+delta); activeDate=d; refresh(); }
  document.getElementById('calPrev').addEventListener('click', ()=>shiftDay(-1));
  document.getElementById('calNext').addEventListener('click', ()=>shiftDay(1));
  document.getElementById('calTodayBtn').addEventListener('click', ()=>{ activeDate=new Date(); refresh(); scrollToNow(); });

  function renderHeader(){
    const d = activeDate;
    const isToday = isSameDay(d, new Date());
    // Weekday + date together on the prominent line so it's unambiguous
    // which day is selected; the sub-line is reserved for a "MA" (today) badge.
    dateMain.textContent = WEEKDAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate() + '.';
    if(isToday){
      dateSub.textContent = 'MA';
      dateSub.style.display = '';
      dateSub.classList.add('is-today');
    }else{
      dateSub.textContent = '';
      dateSub.style.display = 'none';
      dateSub.classList.remove('is-today');
    }
  }

  function renderLegend(){
    legendEl.innerHTML='';
    loadCategories().forEach(c=>{
      const item = document.createElement('span');
      item.className='cal-leg';
      item.innerHTML='<span class="cal-leg-dot" style="background:'+c.color+'"></span>'+escAttr(c.label);
      legendEl.appendChild(item);
    });
  }

  function refresh(){ renderHeader(); render(); }

  function scrollToNow(){
    const now = new Date();
    let m = now.getHours()*60 + now.getMinutes();
    if(m < START_HOUR*60) m = START_HOUR*60;
    const y = Math.max(0, minToY(m) - 140);
    scrollEl.scrollTop = y;
  }

  // The CSS fallback (calc(100dvh - 240px)) is a guess at the combined height
  // of the sticky topbar + page header + fixed bottombar — all injected by
  // topbar.js, whose exact height varies with text wrapping/safe-area. On
  // mobile, measure the actual remaining space so the timeline never runs
  // under the fixed bottom tab bar or leaves an awkward gap. No-op on
  // desktop — clears the inline override so the static CSS rule (560px)
  // applies untouched.
  function applyMobileScrollHeight(){
    if(!window.matchMedia('(max-width:480px)').matches){
      scrollEl.style.maxHeight = '';
      return;
    }
    const bottombar = document.querySelector('.bottombar');
    const bottombarH = bottombar ? bottombar.getBoundingClientRect().height : 0;
    const top = scrollEl.getBoundingClientRect().top;
    const available = window.innerHeight - top - bottombarH - 12;
    scrollEl.style.maxHeight = Math.max(200, Math.round(available)) + 'px';
  }

  function seedIfEmpty(){
    const today = new Date();
    const key = scheduleKey(today);
    if(storeGet(key) !== null) return;
    const plan = [
      { title:'Ebéd',                 start:'13:00', end:'13:40', cat:'meal' },
      { title:'Pihi / alvás',         start:'13:40', end:'14:20', cat:'rest' },
      { title:'Vinted feltöltés',     start:'14:20', end:'15:10', cat:'focus' },
      { title:'Futás + húzódzkodás',  start:'15:10', end:'16:20', cat:'training' },
      { title:'Zuhany',               start:'16:20', end:'16:40', cat:'other' },
      { title:'Dashboard',            start:'16:40', end:'17:20', cat:'focus' },
      { title:'Vacsora',              start:'17:20', end:'17:50', cat:'meal' },
      { title:'Munka Szegeden',       start:'18:00', end:'23:30', cat:'work' },
    ].map(b=>({ id: uid(), ...b }));
    storeSet(key, plan);
  }

  buildGrid();
  renderLegend();
  seedIfEmpty();
  refresh();
  applyMobileScrollHeight();
  scrollToNow();
  renderNow();
  setInterval(renderNow, 30*1000);

  // topbar.js is loaded with `defer`, so its bottombar isn't injected yet at
  // the point this inline script runs. Re-measure once everything (including
  // deferred scripts) has loaded, and again on any resize/rotation.
  window.addEventListener('load', applyMobileScrollHeight);
  window.addEventListener('resize', applyMobileScrollHeight);
  window.addEventListener('orientationchange', applyMobileScrollHeight);

  // Reset to today when the page is restored from BFcache (browser back/forward).
  // Without this, activeDate stays frozen at the date the page was first loaded.
  window.addEventListener('pageshow', function(e){
    if(e.persisted){
      activeDate = new Date();
      seedIfEmpty();
      refresh();
      applyMobileScrollHeight();
      scrollToNow();
    }
  });

  // Reset if the calendar day rolled over while this tab was hidden.
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'visible' && !isSameDay(activeDate, new Date())){
      activeDate = new Date();
      seedIfEmpty();
      refresh();
      applyMobileScrollHeight();
      scrollToNow();
    }
  });

  // Expose a re-render entry point so the cloud-sync onApplied callback can
  // refresh in the same tab (storage events from localStorage.setItem don't
  // fire in the originating tab, so the storage listener below can't catch
  // same-tab sync). Also refreshes the legend/chips in case a synced change
  // touched categories, not just blocks.
  window._scheduleRender = refreshCategoryDependentUI;

  // Re-render when another tab writes schedule or category data (e.g. cloud sync applies)
  window.addEventListener('storage', (e)=>{
    if(!e.key) return;
    if(e.key.startsWith('schedule:')) render();
    else if(e.key === CATS_KEY) refreshCategoryDependentUI();
  });

})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'schedule',
    syncedKeys: ['dayplanner_categories'],
    syncedPrefixes: ['schedule:'],
    onApplied: function () { if(typeof window._scheduleRender === 'function') window._scheduleRender(); }
  });
});
</script>
</body>
</html>
