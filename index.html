<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Dominik's Dashboard</title>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #000;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body {
  min-height: 100vh;
  padding: max(32px, env(safe-area-inset-top)) max(28px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom)) max(28px, env(safe-area-inset-left));
}
.launcher { max-width: 1180px; margin: 0 auto; }

.launcher-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.launcher-title {
  margin: 0;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}
.launcher-settings {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px; height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.launcher-settings:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.launcher-settings:active { transform: scale(0.94); }
.launcher-settings:focus-visible {
  outline: 2px solid rgba(255,255,255,0.5);
  outline-offset: 2px;
}

/* ===== Bento grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 16px;
}
@media (max-width: 980px) {
  .bento { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .card-main { grid-row: span 1 !important; }
}
@media (max-width: 620px) {
  .bento { grid-template-columns: 1fr; grid-auto-rows: auto; }
  .bento-card { grid-column: span 1 !important; grid-row: span 1 !important; min-height: 152px; }
}

.bento-card {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-radius: 20px;
  padding: 22px;
  background: #0a0a0b;
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.bento-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at var(--glow-x, 85%) var(--glow-y, 0%), var(--glow, rgba(255,255,255,0.08)), transparent 62%);
  opacity: 0.9;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.bento-card:hover,
.bento-card:focus-visible {
  transform: translateY(-3px) scale(1.012);
  border-color: rgba(255,255,255,0.16);
  box-shadow: 0 16px 40px rgba(0,0,0,0.55);
}
.bento-card:hover::before,
.bento-card:focus-visible::before { opacity: 1.3; }
.bento-card:focus-visible {
  outline: 2px solid rgba(255,255,255,0.55);
  outline-offset: 3px;
}
.bento-card:hover .bento-arrow,
.bento-card:focus-visible .bento-arrow {
  transform: translateX(3px);
  opacity: 1;
  color: var(--text-primary);
}

.bento-row-top {
  position: relative; z-index: 1;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.bento-index {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
}
.bento-icon {
  font-size: 22px;
  line-height: 1;
}

.bento-row-bottom {
  position: relative; z-index: 1;
  margin-top: auto;
  padding-right: 28px;
}
.bento-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.bento-sub {
  font-size: 12.5px;
  color: var(--text-tertiary);
  margin-top: 4px;
  line-height: 1.4;
}
.bento-stat {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-secondary);
  letter-spacing: 0.02em;
  margin-top: 9px;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.bento-stat.has-data { opacity: 0.9; }

.bento-arrow {
  position: absolute;
  right: 20px; bottom: 20px;
  z-index: 1;
  font-size: 15px;
  color: var(--text-tertiary);
  opacity: 0.65;
  transition: transform 0.2s ease, opacity 0.2s ease, color 0.2s ease;
}

/* Hero card gets larger type */
.card-main { grid-column: span 2; grid-row: span 2; }
.card-main .bento-title { font-size: 30px; }
.card-main .bento-sub { font-size: 13.5px; }
.card-main .bento-icon { font-size: 28px; }

.card-fitness,
.card-health { grid-column: span 1; grid-row: span 1; }

.card-habits,
.card-planner,
.card-finance { grid-column: span 2; grid-row: span 1; }

/* Per-card muted gradient glow */
.card-main     { --glow: rgba(107, 227, 164, 0.20); --glow-x: 85%; --glow-y: 0%; }
.card-fitness  { --glow: rgba(148, 128, 230, 0.20); --glow-x: 90%; --glow-y: 0%; }
.card-health   { --glow: rgba(255, 138, 138, 0.18); --glow-x: 90%; --glow-y: 0%; }
.card-habits   { --glow: rgba(255, 143, 179, 0.18); --glow-x: 92%; --glow-y: 0%; }
.card-planner  { --glow: rgba(125, 211, 252, 0.20); --glow-x: 92%; --glow-y: 0%; }
.card-finance  { --glow: rgba(242, 192, 99, 0.20);  --glow-x: 92%; --glow-y: 0%; }

@media (max-width: 480px) {
  .launcher-title { font-size: 21px; }
  .bento-card { padding: 18px; }
  .card-main .bento-title { font-size: 24px; }
}
</style>
</head>
<body>
<div class="launcher">

  <header class="launcher-head">
    <h1 class="launcher-title">Dominik's Dashboard</h1>
    <button class="launcher-settings" type="button" aria-label="Settings" title="Settings (coming soon)">⚙</button>
  </header>

  <div class="bento" id="bentoGrid">

    <a class="bento-card card-main" href="main.html">
      <div class="bento-row-top">
        <span class="bento-index">· 01</span>
        <span class="bento-icon">🏠</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Main</div>
        <div class="bento-sub">Goals &amp; daily plan</div>
        <div class="bento-stat" data-stat="main"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

    <a class="bento-card card-fitness" href="gym.html">
      <div class="bento-row-top">
        <span class="bento-index">· 02</span>
        <span class="bento-icon">💪</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Fitness</div>
        <div class="bento-sub">Workouts, splits, sessions</div>
        <div class="bento-stat" data-stat="fitness"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

    <a class="bento-card card-health" href="health.html">
      <div class="bento-row-top">
        <span class="bento-index">· 03</span>
        <span class="bento-icon">🩺</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Health</div>
        <div class="bento-sub">Supplements &amp; vitals</div>
        <div class="bento-stat" data-stat="health"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

    <a class="bento-card card-habits" href="habits.html">
      <div class="bento-row-top">
        <span class="bento-index">· 04</span>
        <span class="bento-icon">🎯</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Habits</div>
        <div class="bento-sub">Daily habit tracker</div>
        <div class="bento-stat" data-stat="habits"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

    <a class="bento-card card-planner" href="schedule.html">
      <div class="bento-row-top">
        <span class="bento-index">· 05</span>
        <span class="bento-icon">📅</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Day Planner</div>
        <div class="bento-sub">Time-blocked daily schedule</div>
        <div class="bento-stat" data-stat="planner"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

    <a class="bento-card card-finance" href="finance.html">
      <div class="bento-row-top">
        <span class="bento-index">· 06</span>
        <span class="bento-icon">📊</span>
      </div>
      <div class="bento-row-bottom">
        <div class="bento-title">Finance</div>
        <div class="bento-sub">Net worth &amp; spending</div>
        <div class="bento-stat" data-stat="finance"></div>
      </div>
      <span class="bento-arrow" aria-hidden="true">→</span>
    </a>

  </div>
</div>

<script>
(function () {
  'use strict';

  // Best-effort, read-only live stats per card. Each block is independently
  // try/caught so one page's storage shape changing can never break the
  // others or the launcher itself — a missing/odd value just leaves that
  // card's stat line blank.
  function storeGet(key) {
    try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
  }
  function pad2(n) { return String(n).padStart(2, '0'); }
  function ymd(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
  function setStat(key, text) {
    if (!text) return;
    const el = document.querySelector('[data-stat="' + key + '"]');
    if (!el) return;
    el.textContent = text;
    el.classList.add('has-data');
  }

  // Main — goals today (mirrors main.html's 6am rollover: before 6am still counts as "yesterday")
  try {
    const now = new Date();
    const active = new Date(now);
    if (now.getHours() < 6) active.setDate(active.getDate() - 1);
    const goals = storeGet('goals:' + ymd(active)) || [];
    if (goals.length) {
      const done = goals.filter(function (g) { return g.done; }).length;
      setStat('main', done + '/' + goals.length + ' goals today');
    }
  } catch (e) {}

  // Fitness — workouts logged in the last 7 days
  try {
    const doneDays = storeGet('po_coach_workout_done') || {};
    let count = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      if (doneDays[ymd(d)]) count++;
    }
    if (Object.keys(doneDays).length) setStat('fitness', count + '/7 workouts this week');
  } catch (e) {}

  // Health — water glasses today (same formula topbar.js uses)
  try {
    const state = storeGet('po_water_v1');
    if (state && state.logs) {
      const today = ymd(new Date());
      const done = state.logs[today] || 0;
      const p = state.profile || { weightKg: 75 };
      const wKg = state.weightUnit === 'lb' ? (p.weightKg || 0) / 2.20462 : (p.weightKg || 0);
      const base = wKg * 35;
      const exercise = (p.activityHrsPerWeek || 0) / 7 * 500;
      const caffeine = Math.max(0, (state.caffeineMgPerDay || 0) - 200) * 1.5;
      const subs = (state.substances || []).reduce(function (s, x) {
        const dose = (x && x.dose != null ? x.dose : (x && x.defaultDose)) || 0;
        return s + Math.max(0, dose * ((x && x.mlPerUnit) || 0));
      }, 0);
      let adjust = 0;
      if (p.sex === 'm') adjust += 200;
      if ((p.age || 0) >= 50) adjust += 100;
      const totalMl = base + exercise + caffeine + subs + adjust;
      let unitVol;
      if (state.unit === 'glass') unitVol = state.glassMl || 250;
      else if (state.unit === 'oz') unitVol = 30;
      else if (state.unit === 'ml') unitVol = 1;
      else unitVol = state.bottleMl || 500;
      const total = Math.max(1, Math.ceil(totalMl / unitVol));
      setStat('health', done + '/' + total + ' water today');
    }
  } catch (e) {}

  // Habits — completed today
  try {
    const habits = storeGet('habits:items') || [];
    if (habits.length) {
      const doneMap = storeGet('habits:done:' + ymd(new Date())) || {};
      const done = habits.filter(function (h) { return doneMap[h.id]; }).length;
      setStat('habits', done + '/' + habits.length + ' done today');
    }
  } catch (e) {}

  // Day Planner — blocks scheduled today
  try {
    const blocks = storeGet('schedule:' + ymd(new Date())) || [];
    if (blocks.length) setStat('planner', blocks.length + (blocks.length === 1 ? ' block today' : ' blocks today'));
  } catch (e) {}

  // Finance — net worth (raw HUF sum across all net-worth account categories)
  try {
    const cats = ['bank', 'stocks', 'crypto', 'other'];
    let total = 0, any = false;
    cats.forEach(function (c) {
      const items = storeGet('nw:' + c) || [];
      items.forEach(function (it) { total += Number(it.amount) || 0; any = true; });
    });
    if (any) setStat('finance', 'HUF ' + Math.round(total).toLocaleString('en-US'));
  } catch (e) {}
})();
</script>
</body>
</html>
